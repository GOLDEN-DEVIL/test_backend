# ===================================================================
# Read-It Bookstore — Application Configuration
# ===================================================================

# -------------------- Server --------------------
server.port=8080

# -------------------- MySQL Datasource --------------------
# Default runs on embedded H2 (relational SQL) for local startup.
# To use MySQL, override DB_URL/DB_USERNAME/DB_PASSWORD/DB_DRIVER via env vars.
spring.datasource.url=${DB_URL:jdbc:h2:mem:readit_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=10

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# -------------------- H2 Console --------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------- JWT --------------------
app.jwt.secret=${JWT_SECRET:ReadItBookstoreSecretKeyForJWTTokenGeneration2024MustBeLongEnough}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# -------------------- Jackson --------------------
spring.jackson.serialization.write-dates-as-timestamps=false
