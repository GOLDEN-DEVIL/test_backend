# ===================================================================
# Read-It Bookstore — Application Configuration
# ===================================================================

# -------------------- Server --------------------
server.port=8080

# -------------------- MySQL Datasource --------------------
# Credentials are externalized via environment variables.
# Defaults are provided for local development.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/webd_project_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -------------------- JWT --------------------
app.jwt.secret=${JWT_SECRET:ReadItBookstoreSecretKeyForJWTTokenGeneration2024MustBeLongEnough}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# -------------------- Jackson --------------------
spring.jackson.serialization.write-dates-as-timestamps=false
